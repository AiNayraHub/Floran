<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gamevoo 3D Runner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #00ffcc;
            font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000;
            pointer-events: none;
        }
        #msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; text-align: center; display: none; background: rgba(0,0,0,0.8);
            padding: 20px; border: 2px solid #00ffcc;
        }
        button {
            background: #00ffcc; border: none; padding: 10px 20px;
            font-size: 18px; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="ui">GAMEVOO COINS: <span id="score">0</span></div>
    
    <div id="msg">
        <h1 id="status">CAUGHT!</h1>
        <button onclick="location.reload()">RESTART RUN</button>
    </div>

    <script>
        // --- 1. SETUP ENGINE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        scene.fog = new THREE.Fog(0x111122, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // --- 2. GAME OBJECTS ---
        // Road
        const roadGeo = new THREE.PlaneGeometry(10, 1000);
        const roadMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        // Player (Gamevoo Hero)
        const playerGeo = new THREE.BoxGeometry(0.8, 1.2, 0.8);
        const playerMat = new THREE.MeshPhongMaterial({ color: 0x00ffcc });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.set(0, 0.6, 0);
        scene.add(player);

        // Enemy (Police/Dog)
        const enemyGeo = new THREE.BoxGeometry(0.7, 1, 0.7);
        const enemyMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
        const enemy = new THREE.Mesh(enemyGeo, enemyMat);
        enemy.position.set(0, 0.5, 3); // Positioned behind player
        scene.add(enemy);

        // --- 3. LOGIC VARIABLES ---
        let score = 0;
        let lane = 0; // -1, 0, 1
        let targetX = 0;
        let isJumping = false;
        let jumpV = 0;
        let gameActive = true;
        let speed = 0.2;
        let obstacles = [];
        let coins = [];

        // --- 4. CONTROLS (Touch & Keyboard) ---
        let touchStartX = 0;
        let touchStartY = 0;

        window.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', e => {
            let diffX = e.changedTouches[0].clientX - touchStartX;
            let diffY = e.changedTouches[0].clientY - touchStartY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 30 && lane < 1) lane++;
                if (diffX < -30 && lane > -1) lane--;
            } else {
                if (diffY < -30 && !isJumping) { isJumping = true; jumpV = 0.2; }
            }
        });

        window.addEventListener('keydown', e => {
            if (e.key === "ArrowLeft" && lane > -1) lane--;
            if (e.key === "ArrowRight" && lane < 1) lane++;
            if (e.key === " " && !isJumping) { isJumping = true; jumpV = 0.2; }
        });

        // --- 5. SPAWNING ---
        function spawn() {
            if (!gameActive) return;
            // Obstacle
            if (Math.random() < 0.05) {
                const oGeo = new THREE.BoxGeometry(2, 1, 1);
                const oMat = new THREE.MeshPhongMaterial({ color: 0xffaa00 });
                const o = new THREE.Mesh(oGeo, oMat);
                o.position.set((Math.floor(Math.random()*3)-1)*3, 0.5, -50);
                scene.add(o);
                obstacles.push(o);
            }
            // Coin
            if (Math.random() < 0.08) {
                const cGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.1, 16);
                const cMat = new THREE.MeshPhongMaterial({ color: 0xffd700 });
                const c = new THREE.Mesh(cGeo, cMat);
                c.rotation.x = Math.PI/2;
                c.position.set((Math.floor(Math.random()*3)-1)*3, 0.7, -50);
                scene.add(c);
                coins.push(c);
            }
        }
        setInterval(spawn, 500);

        // --- 6. ANIMATION LOOP ---
        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);

            // Movement Physics
            targetX = lane * 3;
            player.position.x += (targetX - player.position.x) * 0.1;
            
            // Enemy following logic (closer if you slow down, but here it stays behind)
            enemy.position.x += (player.position.x - enemy.position.x) * 0.05;

            // Jump Physics
            if (isJumping) {
                player.position.y += jumpV;
                jumpV -= 0.01;
                if (player.position.y <= 0.6) {
                    player.position.y = 0.6;
                    isJumping = false;
                }
            }

            // Move World
            obstacles.forEach((o, i) => {
                o.position.z += speed;
                // Collision
                if (Math.abs(o.position.z - player.position.z) < 1 && 
                    Math.abs(o.position.x - player.position.x) < 1.5 && 
                    player.position.y < 1.2) {
                    gameActive = false;
                    document.getElementById('msg').style.display = 'block';
                }
                if (o.position.z > 10) { scene.remove(o); obstacles.splice(i, 1); }
            });

            coins.forEach((c, i) => {
                c.position.z += speed;
                c.rotation.y += 0.05;
                // Collect Coin
                if (Math.abs(c.position.z - player.position.z) < 1 && 
                    Math.abs(c.position.x - player.position.x) < 1) {
                    score++;
                    document.getElementById('score').innerText = score;
                    scene.remove(c);
                    coins.splice(i, 1);
                }
                if (c.position.z > 10) { scene.remove(c); coins.splice(i, 1); }
            });

            speed += 0.0001;
            renderer.render(scene, camera);
            camera.position.set(player.position.x, 4, 6);
            camera.lookAt(player.position.x, 1, -5);
        }

        animate();
    </script>
</body>
</html>
