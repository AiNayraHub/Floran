<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gamevoo Pro Runner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #00ffcc; font-size: 28px; font-weight: 900; pointer-events: none;
            text-shadow: 0 0 10px #00ffcc;
        }
        #timer-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        #countdown { font-size: 120px; color: #fff; }
        #msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; text-align: center; display: none; background: rgba(0,0,0,0.9);
            padding: 40px; border: 3px solid #00ffcc; border-radius: 20px; z-index: 101;
        }
        button {
            background: #00ffcc; border: none; padding: 15px 30px;
            font-size: 20px; cursor: pointer; margin-top: 20px; font-family: 'Orbitron';
            font-weight: bold; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
    </style>
</head>
<body>

    <div id="ui">GAMEVOO: <span id="score">0</span></div>
    
    <div id="timer-screen">
        <h2 style="color: #00ffcc;">GET READY...</h2>
        <div id="countdown">3</div>
    </div>

    <div id="msg">
        <h1 style="color: #ff0055;">WRECKED!</h1>
        <p id="final-score"></p>
        <button onclick="location.reload()">RE-RUN</button>
    </div>

    <script>
        // --- CONFIG ---
        let score = 0;
        let gameActive = false;
        let speed = 0.35;
        let lane = 0;
        let isJumping = false;
        let jumpV = 0;
        let obstacles = [];
        let coins = [];

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 10, 60);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0x00ffcc, 1);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        // --- GROUND & TRACKS ---
        const groundGeo = new THREE.PlaneGeometry(20, 2000);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Grid Lines (Movement Effect)
        const grid = new THREE.GridHelper(100, 50, 0x00ffcc, 0x222222);
        scene.add(grid);

        // --- PLAYER ---
        const playerGeo = new THREE.BoxGeometry(0.8, 1.4, 0.8);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.set(0, 0.7, 0);
        scene.add(player);

        // --- FUNCTIONS ---
        function startTimer() {
            let count = 3;
            const timerDiv = document.getElementById('countdown');
            const interval = setInterval(() => {
                count--;
                if(count > 0) {
                    timerDiv.innerText = count;
                } else {
                    timerDiv.innerText = "GO!";
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('timer-screen').style.display = 'none';
                        gameActive = true;
                        animate();
                    }, 500);
                }
            }, 1000);
        }

        function createTrain(laneIndex) {
            const group = new THREE.Group();
            // Main Body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2.5, 3, 15), 
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            // Front Window
            const window = new THREE.Mesh(
                new THREE.BoxGeometry(2.2, 1, 0.5),
                new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff })
            );
            window.position.set(0, 0.8, -7.5);
            group.add(body, window);
            
            group.position.set(laneIndex * 4, 1.5, -100);
            scene.add(group);
            obstacles.push({ mesh: group, type: 'train' });
        }

        function createCoin(laneIndex) {
            const mesh = new THREE.Mesh(
                new THREE.CylinderGeometry(0.4, 0.4, 0.1, 16),
                new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.2 })
            );
            mesh.rotation.x = Math.PI/2;
            mesh.position.set(laneIndex * 4, 1, -60);
            scene.add(mesh);
            coins.push(mesh);
        }

        // --- CONTROLS ---
        window.addEventListener('keydown', e => {
            if (e.key === "ArrowLeft" && lane > -1) lane--;
            if (e.key === "ArrowRight" && lane < 1) lane++;
            if ((e.key === " " || e.key === "ArrowUp") && !isJumping) { 
                isJumping = true; 
                jumpV = 0.25; 
            }
        });

        // --- GAME LOOP ---
        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);

            // Smooth Lane Move
            player.position.x += (lane * 4 - player.position.x) * 0.15;

            // Jump
            if (isJumping) {
                player.position.y += jumpV;
                jumpV -= 0.012;
                if (player.position.y <= 0.7) {
                    player.position.y = 0.7;
                    isJumping = false;
                }
            }

            // Spawn Logic
            if (Math.random() < 0.01) createTrain(Math.floor(Math.random()*3)-1);
